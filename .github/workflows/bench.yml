name: Benchmark

on:
  push:
    branches: [main]
    paths: ['**.go']
  pull_request:
    branches: [main, master]

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go test -bench=. -benchmem -run=^$ ./...
